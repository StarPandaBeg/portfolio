name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint and build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      VITE_URL_GITHUB: ${{ vars.VITE_URL_GITHUB }}
      VITE_URL_HH: ${{ vars.VITE_URL_HH }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: portfolio-dist-${{ github.sha }}
          path: dist/
          if-no-files-found: error
          retention-days: 14
